name: Generate Audiobook

on:
  repository_dispatch:
    types: [content-updated]
  workflow_dispatch:
    inputs:
      book_path:
        description: 'Book path filter (e.g., A Library of Classics/A Pastoral Shelf/Oration II)'
        required: false
      force_regenerate:
        description: 'Force regeneration of all sessions (ignore content hash)'
        required: false
        default: 'false'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout audiobook tooling
        uses: actions/checkout@v4

      - name: Checkout resources content
        uses: actions/checkout@v4
        with:
          repository: Noble-Collective/Noble-Imprint-Resources
          token: ${{ secrets.RESOURCES_TOKEN }}
          path: resources

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Detect changes
        id: detect
        run: |
          for attempt in 1 2 3; do
            if node src/detect-changes.js; then
              exit 0
            fi
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done
          echo "All attempts failed"
          exit 1
        env:
          RESOURCES_PATH: resources
          GCS_BUCKET: noble-imprint-audiobooks
          FORCE_REGENERATE: ${{ github.event.inputs.force_regenerate || 'false' }}
          BOOK_PATH_FILTER: ${{ github.event.inputs.book_path || '' }}

      - name: Generate audio
        if: steps.detect.outputs.has_work == 'true'
        run: node src/generate.js
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          RESOURCES_TOKEN: ${{ secrets.RESOURCES_TOKEN }}
          GCS_BUCKET: noble-imprint-audiobooks
          RESOURCES_PATH: resources
          WORK_FILE: ${{ steps.detect.outputs.work_file }}
          BOOK_PATH_FILTER: ${{ github.event.inputs.book_path || '' }}
          FORCE_REGENERATE: ${{ github.event.inputs.force_regenerate || 'false' }}

      - name: Notify website
        if: steps.detect.outputs.has_work == 'true'
        run: |
          curl -s -X POST https://resources.noblecollective.org/api/refresh-audio || true
