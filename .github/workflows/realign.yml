name: Realign Timestamps

on:
  workflow_dispatch:
    inputs:
      book_path:
        description: 'Book path filter (e.g., A Library of Classics/A Pastoral Shelf/Oration II)'
        required: false

jobs:
  realign:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout audiobook tooling
        uses: actions/checkout@v4

      - name: Checkout resources content
        uses: actions/checkout@v4
        with:
          repository: Noble-Collective/Noble-Imprint-Resources
          token: ${{ secrets.RESOURCES_TOKEN }}
          path: resources

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Realign all sessions with audio
        run: node src/realign.js
        env:
          GCS_BUCKET: noble-imprint-audiobooks
          RESOURCES_PATH: resources
          BOOK_PATH_FILTER: ${{ github.event.inputs.book_path || '' }}

      - name: Notify website
        run: |
          curl -s -X POST https://resources.noblecollective.org/api/refresh-audio || true
